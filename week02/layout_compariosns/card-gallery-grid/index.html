<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Gallery Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Card Gallery</h1>

    <div class="gallery">

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Everest_North_Face_toward_Base_Camp_Tibet_Luca_Galuzzi_2006.jpg" alt="beautiful mountain scenery">
            <h3>Mountain</h3>
            <p>Beautiful mountain scenery.</p>
        </div>

        <div class="card">
            <img src="https://ethnasia.com/cdn/shop/articles/sean-o-KMn4VEeEPR8-unsplash_edited.jpg?v=1621585619" alt="relaxing beach view">
            <h3>Beach</h3>
            <p>Relaxing beach view.</p>
        </div>

        <div class="card">
            <img src="https://www.metroparks.net/wp-content/uploads/2017/06/1080p_HBK_autumn-morning_GI-1024x686.jpg" alt="forest landscape">
            <h3>Forest</h3>
            <p>Green forest landscape.</p>
        </div>

        <div class="card">
            <img src="https://img.magnific.com/free-photo/seattle-sunrise-skyline-silhouette-view-with-urban-office-buildings_649448-2651.jpg?semt=ais_hybrid&w=740&q=80" alt="city skyline">
            <h3>City</h3>
            <p>Modern city skyline.</p>
        </div>

        <div class="card">
            <img src="https://thumbs.dreamstime.com/b/lake-view-29117482.jpg" alt="lake view">
            <h3>Lake</h3>
            <p>Peaceful lake view.</p>
        </div>

        <div class="card">
            <img src="https://stormgeo.com/_next/image?url=https%3A%2F%2Fwww.datocms-assets.com%2F119923%2F1714341259-desert-1.jpg%3Fauto%3Dcompress%26fm%3Dwebp%26q%3D75&w=3840&q=75&dpl=dpl_As57xKm5D9xmmgSTAGVERXkUQpf7" alt="desert landscape">
            <h3>Desert</h3>
            <p>Golden sand dunes.</p>
        </div>

    </div>

</body>
</html>
